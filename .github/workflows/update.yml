name: Update catalog

on:
  schedule:
    # Каждый понедельник в 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run update script
        run: npm run update

      - name: Commit and push if changed
        run: |
          if git diff --quiet creditors.json; then
            echo "Каталог не изменился — нечего коммитить"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add creditors.json
          git commit -m "chore(catalog): weekly update from CBR registry"
          git push
